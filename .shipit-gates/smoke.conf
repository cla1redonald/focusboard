# ShipIt runtime smoke-test config — read by the runtime-smoke CI workflow + /ship.
# Sourced as bash (`set -a; . smoke.conf`), so quote any value containing # or shell
# metacharacters. After each deploy the gate hits the DEPLOYED artifact.
#
# FocusBoard = the first real customer of this gate. The 504 that taught us we needed it
# was a Hono Web handler on the Node runtime: build + 661 tests + deploy + review all
# green, yet EVERY /api route 504'd. A SPA-root check alone misses that — so we smoke the
# real API boundary.

# /api/capture is the critical Hono route. Unauthenticated it returns exactly 401 —
# 401 proves the function booted, the Node-runtime adapter works, AND auth middleware
# runs; a 504/timeout (the original bug) or a platform 404 fails the gate.
# /api/health/deep is deliberately MULTI-SEGMENT: Vercel silently platform-404'd
# multi-segment paths to the old [...path].ts catch-all while single-segment routes
# worked — the =200 pin makes that class of routing regression fail the gate.
SHIPIT_SMOKE_PATHS=/api/capture=401,/api/health/deep=200,/api/focus/status=401,/api/review/daily=401

# Phase 5a digests, checked on BOTH rungs: =401 above proves the route is
# registered + scope-enforced; the authed =200s below prove the digest pipeline
# (board rows + focus_sessions table + metrics blob + review.ts import) works
# end-to-end on the deployed artifact with the smoke token.
SHIPIT_SMOKE_AUTH_PATHS=/api/review/daily=200,/api/review/weekly=200,/api/focus/history=200

# Also load the SPA root in Playwright and assert it actually RENDERED.
SHIPIT_SMOKE_UI=1

# Assert a child mounted under #root, not just that the (empty) mount div exists — this
# catches a white-screen mount failure that a bare `body` selector would pass.
SHIPIT_SMOKE_SELECTOR='#root > *'

# Optional full E2E suite against the deploy (Cypress/Playwright-Test/Cucumber).
# Two browser/auth rungs, chained:
#   oauth-smoke — real-browser OAuth login -> redirect -> token -> MCP (CSP/cache).
#   ai-smoke    — real Supabase session token -> authed /api/ai/* -> 200. Catches
#                 the dead-model/bad-key class that 401-only unauth checks miss
#                 (the June 2026 AI outage). Skips cleanly if its env is unset.
# Run BOTH unconditionally (not `&&`): an oauth-smoke failure must NOT skip the AI
# rung — that's the exact bug class this exists to catch. Fail if EITHER fails.
SHIPIT_SMOKE_E2E_CMD="node scripts/oauth-smoke.mjs; r1=$?; node scripts/ai-smoke.mjs; r2=$?; exit $(( r1 || r2 ))"

# Authenticated round-trip rung (capture → inbox → dismiss) runs when the CI secret
# FOCUSBOARD_SMOKE_TOKEN is set (a dedicated capture-only PAT named "ci-smoke").
# It catches wrong-rows-to-an-authed-caller — the inbox status-filter bug class —
# which no unauthenticated check can see. Cost: ~1 small AI parse per deploy.
# The token is injected by runtime-smoke.yml as SHIPIT_SMOKE_AUTH_TOKEN.

# ShipIt runtime smoke-test config — read by the runtime-smoke CI workflow + /ship.
# Sourced as bash (`set -a; . smoke.conf`), so quote any value containing # or shell
# metacharacters. After each deploy the gate hits the DEPLOYED artifact.
#
# FocusBoard = the first real customer of this gate. The 504 that taught us we needed it
# was a Hono Web handler on the Node runtime: build + 661 tests + deploy + review all
# green, yet EVERY /api route 504'd. A SPA-root check alone misses that — so we smoke the
# real API boundary.

# /api/capture is the critical Hono route. Unauthenticated it returns 401 (auth required) —
# NOT a 5xx — which is exactly the signal we want: 401 proves the function booted and the
# Node-runtime adapter routes correctly; a 504/timeout (the original bug) fails the gate.
SHIPIT_SMOKE_PATHS=/api/capture

# Also load the SPA root in Playwright and assert it actually RENDERED.
SHIPIT_SMOKE_UI=1

# Assert a child mounted under #root, not just that the (empty) mount div exists — this
# catches a white-screen mount failure that a bare `body` selector would pass.
SHIPIT_SMOKE_SELECTOR='#root > *'

# Optional full E2E suite against the deploy (Cypress/Playwright-Test/Cucumber). Unset for now.
SHIPIT_SMOKE_E2E_CMD=

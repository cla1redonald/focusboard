<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A focused Kanban board with WIP limits, swimlanes, and smart card creation" />
    <meta name="theme-color" content="#10B981" />
    <title>Focusboard</title>
    <script>
      // Prevent flash of wrong theme (FOUC prevention)
      (function() {
        try {
          var stored = localStorage.getItem('focusboard:v4');
          if (stored) {
            var state = JSON.parse(stored);
            var theme = state.settings && state.settings.theme;
            if (theme === 'dark') {
              document.documentElement.classList.add('dark');
            } else if (theme === 'system') {
              if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
              } else {
                document.documentElement.classList.add('light');
              }
            } else {
              document.documentElement.classList.add('light');
            }
          } else {
            document.documentElement.classList.add('light');
          }
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

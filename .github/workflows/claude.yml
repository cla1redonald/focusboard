name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
        startsWith(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
        startsWith(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: |
            --max-turns 20
            --model claude-sonnet-4-6
            --allowedTools "Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(npm ci),Bash(npm run typecheck),Bash(npm run lint),Bash(npm run test:run),Bash(npm run build)"
            --system-prompt "Use REVIEW.md when reviewing Focusboard PRs. For PR review requests, prioritize correctness, data loss, security, user-facing regressions, and missing tests. Do not make code changes unless the user explicitly asks for implementation."

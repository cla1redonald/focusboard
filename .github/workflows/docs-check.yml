name: Docs sync check

# Flags any PR where code (scripts/ agents/ commands/ hooks/ .shipit-gates/) changed without a
# corresponding docs update (README/CLAUDE/AGENTS/HISTORY/docs). Overridable: add [no-docs]
# to a commit message when a change genuinely needs none. Pure bash — no LLM, no
# secrets, no token cost. Runs in a few seconds.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff against the base branch
      - name: Check docs kept in sync with code (touch gate)
        run: bash .shipit-gates/check-docs-sync.sh "origin/${{ github.base_ref }}"

  # CONTENT-coverage gate: asserts docs/API.md mentions every ROUTE_SCOPES route and
  # docs/SUPABASE.md mentions every migration table/function. Catches the drift the
  # touch gate above cannot (an unrelated doc edit satisfies the touch gate while
  # API.md/SUPABASE.md silently go stale — the FocusBoard Phase 3–6 incident).
  docs-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check docs cover every route + table
        env:
          SHIPIT_DOCS_COVERAGE_BASE: origin/${{ github.base_ref }}
        run: bash .shipit-gates/check-docs-coverage.sh
